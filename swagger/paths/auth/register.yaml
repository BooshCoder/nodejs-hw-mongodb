tags:
  - Auth
summary: Реєстрація нового користувача
operationId: registerUser
description: Створення нового облікового запису користувача
security: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - name
          - email
          - password
        properties:
          name:
            type: string
            example: John Doe
          email:
            type: string
            format: email
            example: user@example.com
          password:
            type: string
            format: password
            minLength: 6
            example: securePassword123
responses:
  '201':
    description: Користувача успішно зареєстровано
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Successfully registered a user!
            data:
              $ref: '../../components/schemas/user.yaml'
  '400':
    $ref: '../../components/responses/400.yaml'
  '409':
    $ref: '../../components/responses/409.yaml'
