description: Not Found - Ресурс не знайдено
content:
  application/json:
    schema:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: Not Found
        data:
          type: object
          properties:
            message:
              type: string
              example: Contact not found
