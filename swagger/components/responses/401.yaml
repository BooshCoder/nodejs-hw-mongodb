description: Unauthorized - Користувач не авторизований
content:
  application/json:
    schema:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: integer
          example: 401
        message:
          type: string
          example: Unauthorized
        data:
          type: object
          properties:
            message:
              type: string
              example: Access token expired or invalid
